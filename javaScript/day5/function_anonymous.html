<script>
// 1. Add 
const add = function(a, b) {
  return a + b;
};
console.log(add(5,3));

// 2. Subtract
const subtract = function(a, b) {
  return a - b;
};
console.log(subtract(8,6));


// 3. Multiply
const multiply = function(a, b) {
  return a * b;
};
console.log(multiply(5,6));

// 4. Divide
const divide = function(a, b) {
  return a / b;
};
console.log(divide(20,5));


// 5. Check even number
const isEven = function(num) {
  return num % 2 === 0;
};
console.log(isEven(8));

// 6. Check odd number
const isOdd = function(num) {
  return num % 2 !== 0;
};
console.log(isOdd(7));


// 7. Square 
const square = function(num) {
  return num * num;
};
console.log(square(8));


// 8. Cube
const cube = function(num) {
  return num * num * num;
};
console.log(cube(6));

// 9. Get string length
const getLength = function(str) {
  return str.length;
};
console.log(getLength("Jeevananth"));

// 10. Convert to uppercase
const toUpper = function(str) {
  return str.toUpperCase();
};
console.log(toUpper("jeeva"));


// 11. Convert to lowercase
const toLower = function(str) {
  return str.toLowerCase();
};
console.log(toLower("JEEVA"));


// 12.maximum
const max = function(a, b) {
  return a > b ? a : b;
};
console.log(max(5,2));

// 13.minimum
const min = function(a, b) {
  return a < b ? a : b;
};
console.log(min(2,8));


// 14.positive/negative
const checkSign = function(num) {
  if (num > 0) return "Positive";
  else if (num < 0) return "Negative";
  else return "Zero";
};
console.log(checkSign(0));


</script>
