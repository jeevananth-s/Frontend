<script>
//normal function
// 1. Add two numbers
function add(a, b) {
  return a + b;
}
console.log(add(5,10));

// 2. Subtract two numbers
function subtract(a, b) {
  return a - b;
}
console.log(subtract(5,2));

// 3. Multiply two numbers
function multiply(a, b) {
  return a * b;
}
console.log(multiply(7,8));

// 4. Divide two numbers
function divide(a, b) {
  return a / b;
}
console.log(divide(10,2));

// 5. Check even number
function isEven(num) {
  return num % 2 == 0;
}
console.log(isEven(5))


// 6. Check odd number
function isOdd(num) {
  return num % 2 != 0;
}
console.log(isOdd(5));

// 7. Find square
function square(num) {
  return num * num;
}
console.log(square(11));

// 8. Find cube
function cube(num) {
  return num * num * num;
}
console.log(cube(11));


// 9. Get length of string
let str = "Jeevananth"
function getLength() {
  return str.length;
}
console.log(getLength());

// 10. Find maximum of two numbers
function max(a, b) {
  return a > b ? a : b;
}
console.log(max(5,3));

// 11. Find minimum of two numbers
function min(a, b) {
  return a < b ? a : b;
}
console.log(min(7,8));

// 12. Check positive or negative
function checkSign(num) {
  if (num > 0) return "Positive";
  else if (num < 0) return "Negative";
  else return "Zero";
}
console.log(checkSign(-15));


</script>
