<html>
    <head>
        <title>Registration Form</title>
    </head>
    <body>
        <center>
            <header><h1>WE VALUE YOUR FEEDBACK, KINDLY FILL DETAILS</h1></header>
                <form>
                    <table>
                        <tr>
                            <td><label for="regno">Enter your Registration No: </label></td>
                            <td><input type="text" name="regno" id="regno" placeholder="Enter Reg. No:" required></td>
                        </tr>
                    
                        <tr>
                            <td><label for="name">Enter your Name:</label></td>
                            <td><input type="text" name="name" id="name" placeholder="Enter your Name"></td>
                        </tr>
                        <tr>
                            <td><label for="dob">DOB</label></td>
                            <td><input type="date" name="dob" id=""></td>
                        </tr>
                        <tr>
                            <td>Gender</td>
                            <td><input type="radio" name="" id="">Male
                                <input type="radio" name="" id="">Female
                                <input type="radio" name="" id="">Others
                            </td>
                           
                        </tr>
                        <tr>
                            <td><label for="no">Phone No:</label></td>
                            <td><input type="tel" name="" id="" placeholder="10 Digit Number:"></td>
                        </tr>
                        <tr>
                            <td><label for="year">Select Your Year</label></td>
                            <td><select required>
                                    <option value="year"selected disabled>Year of Study</option>
                                    <option value="">First Year</option>
                                    <option value="">Second Year</option>
                                    <option value="">Third Year</option>
                                    <option value="">Final Year</option>
                                </select>
                            </td> 
                        <tr>
                            <td><label for="department">Select your Department</label></td>
                            <td>
                                <select required>
                                        <option value="dep"selected disabled>Select your Department</option> 
                                        <option value="Mechanical">Mechanical</option>
                                        <option value="Civil">Civil</option>
                                        <option value="EEE">EEE</option>
                                        <option value="E&I">E&I</option>
                                        <option value="ECE">ECE</option>
                                        <option value="CSE">CSE</option>
                                        <option value="IT">IT</option>
                                 </select>
                            </td>
                        <tr>
                            <td><label for="issues">Select your Issue</label></td>
                            <td><fieldset>
                                    <input type="checkbox" name="" id="">Academic Issues 
                                    <input type="checkbox" name="" id="">Infrastructure Issues
                                    <input type="checkbox" name="" id="">Communication Issues
                                    <input type="checkbox" name="" id="">Others
                                </fieldset>
                            </td>
                        <tr>
                            <td><label for="comments">Comments</label></td>
                            <td><textarea></textarea></td>
                        </tr>
                    </table><br><br>
                    <input type="submit"> | <input type="reset">
                </form>
        </center>
    </body>
</html>
